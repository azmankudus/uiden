<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>415 - Unsupported Media Type</title>
  <link rel="stylesheet" href="error.css" />
</head>
<body>
  <div class="error-container">

  </div>
  <script src="error.js"></script>

</html>
