<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>406 - Not Acceptable</title>
  <link rel="stylesheet" href="error.css" />
</head>
<body>
  <div class="error-container">
    <div class="tape"></div>
    <div class="error-code">406</div>
    <div class="error-name">Not Acceptable</div>
    <p class="error-message">
      The requested resource is only capable of generating response content not acceptable according to the Accept headers sent in the request.
    </p>
    <div class="tape"></div>
  </div>
  <script src="error.js"></script>
</body>
</html>
